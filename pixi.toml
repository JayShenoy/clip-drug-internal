[workspace]
authors = ["Jay Shenoy <jay@jayshenoy.com>"]
channels = ["conda-forge", "nvidia", "pytorch"]
name = "clip-drug-internal"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
install-torch-cuda = "pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124"

[dependencies]
python = ">=3.13,<3.14"
pandas = ">=3.0.3,<4"
numpy = ">=2.4.6,<3"
scipy = ">=1.17.1,<2"
matplotlib = ">=3.10.9,<4"
seaborn = ">=0.13.2,<0.14"
networkx = ">=3.6.1,<4"
python-louvain = ">=0.16,<0.17"
pip = ">=25.0"
rdkit = "*"

[pypi-dependencies]
transformers = ">=4.40"
torch-geometric = ">=2.5"
tokenizers = ">=0.22.2, <0.23"
safetensors = ">=0.8.0, <0.9"
huggingface-hub = ">=1.18.0, <2"
openpyxl = ">=3.1.5, <4"
